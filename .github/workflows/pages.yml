name: pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@v6
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build committed dist
        run: npm run build
      - name: Check dist
        run: npm run check:dist
      - name: Verify committed dist
        run: git diff --exit-code -- dist/index.html dist/cli.mjs
      - name: Build pages dist
        if: github.event_name != 'pull_request'
        run: AUTHCONV_BUILD_SHA="$GITHUB_SHA" npm run build
      - name: Check pages dist
        if: github.event_name != 'pull_request'
        run: npm run check:dist
      - name: Upload pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
